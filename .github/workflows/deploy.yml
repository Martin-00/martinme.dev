name: Deploy martinme.dev

on:
  push:
    branches: [main]

concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  id-token: write   # Required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy Immutable Assets
        run: |
          aws s3 sync dist/_astro s3://martinme.dev/_astro \
            --cache-control "public,max-age=31536000,immutable"

      - name: Deploy HTML and remaining files
        run: |
          aws s3 sync dist s3://martinme.dev --delete \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E39RCQ73MJ700B \
            --paths "/*"
